<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Módulos — Semente da Vida</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="page-modulos">

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo-link">
        <img src="image/logo-footer.png" alt="Instituto Semente da Vida" class="header__logo" />
      </a>
      <nav class="header__nav">
        <a href="index.html" class="nav-link">Início</a>
        <a href="index.html#sobre" class="nav-link">Sobre</a>
      </nav>
    </div>
  </header>

  <!-- ===== HERO DA FAIXA ===== -->
  <section class="modules-hero" id="modulesHero">
    <div class="container modules-hero__inner">
      <a href="index.html#faixas" class="modules-back-link" id="backLink">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Voltar
      </a>
      <div class="modules-hero__emoji" id="faixaEmoji">🌱</div>
      <h1 class="modules-hero__title" id="faixaTitle">Carregando...</h1>
      <p class="modules-hero__sub" id="faixaSub">Escolha um módulo para começar sua jornada.</p>
      <div class="modules-hero__badge" id="faixaBadge">6 módulos disponíveis</div>
    </div>
  </section>

  <!-- ===== GRADE DE MÓDULOS ===== -->
  <section class="modules-grid-section">
    <div class="container">
      <p class="modules-grid-hint">Clique em um módulo para começar</p>
      <div class="modules-grid" id="modulesGrid">
        <!-- Gerado pelo modulos.js -->
      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer footer--simple">
    <div class="container footer__inner">
      <p class="footer__copy">Instituto Semente da Vida</p>
      <a href="index.html" class="btn btn--ghost btn--sm">← Início</a>
    </div>
  </footer>

  <script src="js/modulos.js"></script>

</body>
</html>
